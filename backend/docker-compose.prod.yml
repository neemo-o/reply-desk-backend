# 📈 E3 — docker-compose.yml para PRODUÇÃO (escala horizontal API + Worker)
#
# Diferente do docker-compose.yml de DEV:
# - API e Worker são serviços separados (image única, target diferente)
# - Postgres com config ajustada para 4 GB (shared_buffers, work_mem)
# - Redis com appendonly (persistência) + AOF
# - MinIO para S3-like storage
# - Logging truncado (max 10MB / 3 arquivos)
# - Restart policy unless-stopped
# - Health checks em todos os serviços
#
# Para dev local, use o `docker-compose.yml` separado (se preferir).

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_saas}
    command: [
      "postgres",
      "-c", "shared_buffers=256MB",
      "-c", "max_connections=200",
      "-c", "work_mem=4MB",
      "-c", "maintenance_work_mem=64MB",
      "-c", "random_page_cost=1.1",
      "-c", "effective_io_concurrency=200"
    ]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin}
      S3_BUCKET: whatsapp-saas-files
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_healthy }
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    # 📈 Escalabilidade horizontal:
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 2048M }
        reservations: { cpus: "0.25", memory: 256M }

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/src/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}   # para o RefreshToken cleanup
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    # 📈 Worker escala independente. Em dev: 1. Em prod: 3-5 replicas possíveis.
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "1.0", memory: 2048M }
        reservations: { cpus: "0.25", memory: 256M }

volumes:
  pg_data:
  redis_data:
  minio_data:
